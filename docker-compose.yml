services:
  db:
    container_name: hexfields-db
    image: postgres:15
    environment:
      POSTGRES_DB: hexfields
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hexfields"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    container_name: hexfields-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hexfields  #'db' from the service name; 'hexfields' from the 'POSTGRES_DB' variable
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      APP_JWT_SECRETKEY: b289de9559b9fe14ef8a5d7dcd91dc94343fce127c15945d21a388f800c28099
      APP_FRONTEND_HOST: http://localhost:5173

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # This service is completely optional, can be removed; it is just a webui to interact with the database
  # Open on localhost:5050 with credentials admin/admin
  pgadmin:
    container_name: hexfields-pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.admin
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data: